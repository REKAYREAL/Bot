# fly.toml
app = "levanter-bot"
primary_region = "fra"

[build]
  dockerfile = "Dockerfile"

[[services]]
  internal_port = 3000
  protocol = "tcp"
  [services.concurrency]
    type = "connections"
    hard_limit = 25
    soft_limit = 20

  [[services.ports]]
    handlers = []
    port = 80
    force_https = true

[mounts]
  source = "levanter_data"
  destination = "/levanter"
